l_english:
 LOADING_TIP_0: "So you didn't give a fuck about us?\n"Yeah, I didn't give a fuck about you.\n- Viktor Zhemchugov to the boyz, May 1st, 2024"
 LOADING_TIP_1: "I'm a special person, I'm a fucking crazy one.\n- Viktor Zhemchugov, May 1st, 2024"
 LOADING_TIP_2: "It doesn't matter how many girls you have, what matters is how many divisions you have.\n- Unknown author"
 LOADING_TIP_3: "There was no such bullshit in my time.\n- Joseph Stalin in the 9B grade class VK group"
 LOADING_TIP_4: "Petersburg weeps with rain when people weep with silence."
 LOADING_TIP_5: "Vladimir Putin is a cucumber.\n- Nikita Andreev"
 LOADING_TIP_6: "But purely hypothetically, if Vitya breaks up with Risha, he'll 100% turn to drink and do some bullshit even worse than what happened in May.\n- Ilya and Sanya during a conversation at the gym (date unknown)"
 LOADING_TIP_7: "Fuck, you're keeping me awake. I was dreaming that trees were laughing.\n- Nikita Andreev, night of August 31st to September 1st, 2024"
 LOADING_TIP_8: "Love is a diplomacy where there are no guarantees and no truces."
 LOADING_TIP_9: "I will give NO security guarantees regarding this whole situation. I was building a normal relationship, but you destroyed everything brick by brick. I am an honest person, and I will tell everything as it was and as it is.\n- Ilya, 17.10.2025"
 LOADING_TIP_10: "I'm as sober as a judge.\n- Sanya, January 1st, 2025"
 LOADING_TIP_11: "\"A son fucks his father. It's always been this way.\"\n- Nikita Andreev, July 10th, 2025"
 LOADING_TIP_12: "Living in a communal apartment, but in the center of St. Petersburg, is better than living in Kudrovo.\n- Kira Sidorova, August 26th, 2025"
 LOADING_TIP_13: "But I live here. And I want everything in this country to be, like, normal. For fashion to be normal, not from Slava Zaitsev. For life to be normal. For Spartak and Zenit, fuck, to play like Inter and Milan. I admit that the majority of the population doesn't need any of this crap.\n- Danila Kozlovsky, the movie 'DukhLess'"
 LOADING_TIP_14: "Vitya started lying first. If he's a bullshitter, then he has to understand how people see him. If a person lies, he has to understand that his friends will treat him like a total bullshitter.\n- Nikita Kudinov talking to Ilya after the situation with Vitya, 15.06.2024, 02:45 AM"
 LOADING_TIP_15: "This morning we woke up to Vitya's loud screams and the sound of machine-gun fire. The war has begun on Mikhaylovskaya Street. Vitya started this bloody war for his own interests. He abandoned us, the boyz. Traded us for some women and some random guys. Everyone who is with us now, fight, stand up against him. Because our lives are in danger.\n- Ilya in a morning address to the boyz, May 2nd, 2024, 7:30 AM"
 LOADING_TIP_16: "I'm your only friend, and these are just bucks! bucks, bucks, fuck, bucks! Pathologically greedy, fuck!n- Danila Kozlovsky"
 LOADING_TIP_17: "Petersburg teaches one thing: beauty and pain go hand in hand, like the river and the embankment."
 LOADING_TIP_18: "The right thing to do when parting is to leave.\n- Erich Maria Remarque, 1945."
 LOADING_TIP_19: "If your friends stay with you, then you're lucky, because that never happened to me.\n- Ronnie James Dio"
 LOADING_TIP_20: "200,000 of Vitya's soldiers are now standing on our borders. Vitya, stop! This crisis can still be resolved, sooner or later.\n- Ilya at the council of the boyz, 30.04.2024"


