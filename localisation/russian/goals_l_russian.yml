 ILY_jessy:0 "Джесси Пинкман"
 ILY_jessy_desc:0 "Джесси Пинкман — персонаж американского драматического сериала «Во все тяжкие» и полнометражного «Путь:0 Во все тяжкие. Фильм». Персонаж, которого сыграл Аарон Пол, был создан сценаристом и режиссёром сериала Винсом Гиллиганом, а также это единственный персонаж, кроме Уолтера Уайта, который появляется в каждом эпизоде сериала."
 ILY_landa:0 "Ганс Ланда"
 ILY_landa_desc:0 "Штандартенфюрер Ганс Ланда — главный антагонист в фильме Квентина Тарантино «Бесславные ублюдки» 2009 года. Его изобразил австрийский актёр Кристоф Вальц, за свою игру получивший широкое признание и многочисленные награды."
 ILY_kira1:0 "Ситуация с Кирой"
 ILY_kira1_desc:0 "История начала общения Ильи с Кирой Сидоровой берет свое начало весной 2024 года.\nЧасто на парах по информатике Кира постоянно просила Илью помочь ей. Летом 2024 года когда Илья был еще в Санкт-Петербурге они часто общались, потом по приезду во Псков они гуляли и они были друзьями. Только друзьями! Ничего другого! Но все пошло наперекосяк.\nВ мае 2025 года Кира зовет Илью к себе. Он не ожидал такое услышать, тем более от Киры. И кто знает что у них будет. Начало отношений или обычный вечер у нее дома"
 ILY_may2025:0 "Работа в Додо"
 ILY_industry1:0 "Начало экономического развития"
 ILY_industry2:0 "Новые магазины на Михайловской"
 ILY_industry2_desc:0 "Для успешного экономического развития нам нужно открывать новые магазины и предприятия на ул.Михайловской"
 ILY_millitary1:0 "Развитие военной промышленности"
 ILY_millitary1_desc:0 "Завод "Борисовичи" в 1990-х годах был военным заводом который производил танки для 76 дивизии. Позже его закрыли из-за кризисов в стране. Сейчас нам нужно его реконструировать для того чтобы начать производство танков"
 ILY_millitary2:0 "Нарастить производство оружия"
 ILY_industry3:0 "Фабрика им. Хойки"
 ILY_industry4:0 "Развивать Михайловскую область"
 ILY_industry5:0 "Развивать все области!"
 ILY_industry6:0 "Михайловский металлургический комплекс"
 ILY_industry7:0 "Текстильный завод им. Юрия Гайдамакина"
 ILY_industry8:0 "Децентрализованная промышленность"
 ILY_research1:0 "Научный центр ул.Байкова"
 ILY_millitary3:0 "Новый генералитет"
 ILY_kiracrisis:0 "Внутренние дела государства"
 ILY_kiracrisis_desc:0 "Основываясь на событиях 18 мая 2025 года и последующим актом игнорирования со стороны Сидоровой Киры у Ильи начался кризис. Частые мысли о ней, о тех надеждах которые она ему дала, о взаимном признании в чувстах и дальнейшее игнорирование не дают нормально сконцентрироваться в плане личной жизни. Илья может попробовать достичь назначенных целей а именно возобновление отношений с Кирой, либо бросить всё и жить счастливой жизнью."
 ILY_accept:0 "Создание МВД ул.Михайловской"
 ILY_MVD3:0 "Подчинение местных управлений"
 ILY_MVD5:0 "Реформа командного состава"
 ILY_helppereezd_desc:0 "Нам написала Кира с просьбой помочь переехать с общежития в квартиру по адресу ул. Труда 53. Может быть получится что-то сделать ради того чтоб возобновить отношения."
 ILY_MVD2:0 "Единый центр управления МВД"
 ILY_kiraandtema_desc:0 "Ситуация становится критической. Кира от нас начала дистанцироваться и начала хорошо общаться с другим одногруппником. Если мы не предпримем никаких действий то она начнет встречаться с ним, а мы получим критический урон"
 ILY_poslatnaxui:0 "Остановиться на этом"
 ILY_poslatnaxui_desc:0 "Мы сделали вывод. Нахуй Киру если есть пацаны и другие девушки. Мы пойдем дальше своими путями"
