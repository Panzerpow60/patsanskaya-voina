 ILY_ohvat98:0 "Система "Охват-98"
 ILY_ohvat98_desc:0 "Система ПВО Охват-98 введен в эксплуатацию в 2022 году. Данная система включает в себя 11 самых новейших систем ПВО, поставленных по периметрам государственной границы и обеспечивает наилучший перехват вражеской авиации и ракет"
 ILY_oil1:0 "Нефть на Михайловской?"
 ILY_oil2:0 "Появление нефтеперерабатывающих заводов"
 ILY_1stwar1:0 "Выстрелы на улице Михайловской..."
 ILY_1stwar1_desc:0 "Витя решил подло напасть на нас. Его поступки не будут прощены пока он не перестанет пиздеть. Мы должны обьявить о создании коалиции против него"
