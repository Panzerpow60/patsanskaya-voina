 ILY_kiracrisis: "Internal Affairs of the State"
 ILY_kiracrisis_desc: "Based on the events of May 18, 2025, and the subsequent act of ignoring by Kira Sidorova, Ilya began a crisis. Frequent thoughts about her, about the hopes she gave him, about mutual confession of feelings, and further ignoring prevent him from concentrating normally on his personal life. Ilya can either try to achieve his set goals, namely rekindling the relationship with Kira, or give up everything and live a happy life."
 ILY_accept: "Creation of the Ministry of Internal Affairs for Mikhaylovskaya Street"
 ILY_MVD3: "Subordination of Local Administrations"
 ILY_MVD5: "Reform of the Command Staff"
 ILY_helppereezd_desc: "Kira wrote to us asking for help moving from the dormitory to an apartment at 53 Truda Street. Maybe we can do something to rekindle the relationship."
 ILY_MVD2: "Unified MVD Command Center"
 ILY_kiraandtema_desc: "The situation is becoming critical. Kira has started to distance herself from us and has begun communicating closely with another classmate. If we don't take any action, she will start dating him, and we will suffer critical damage."
 ILY_poslatnaxui: "Stop Here"
 ILY_poslatnaxui_desc: "We've made our decision. To hell with Kira, we have the boyz and other girls. We'll go our own way."
