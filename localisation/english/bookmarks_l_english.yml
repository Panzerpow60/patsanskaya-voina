l_english:
 BM_HISTORY_TITLE: "Brief Summary"
 GATHERING_STORM_NAME: "Point of No Return"
 GATHERING_STORM_DESC: "Since 2022, the situation around Vitya and the boyz has begun to heat up. Vitya starts doing bad things, which makes the boyz unhappy. One crazy act, one spark, will be enough to break up the whole crew and unleash a conflict."
 HITTING_FAN_NAME: "And So It Begins"
 HITTING_FAN_DESC: "Yes, that's right! A collection of umbrellas might come in handy today."
 FRA_GATHERING_STORM_DESC: "Vitya was born into an ordinary, well-off family in 2007. In his 17 years of life, much has changed. New acquaintances, arguments, ups and downs, actions to be proud of, and actions that are even shameful to talk about. Now he is in a great company of boyz he has been friends with for 10 years, and now in 2023, he should think about lasting friendship until the end; otherwise, if he does something wrong, serious consequences await him."
 VIK_GATHERING_STORM_DESC: "Vitya was born into an ordinary, well-off family in 2007. In his 17 years of life, much has changed. New acquaintances, arguments, ups and downs, actions to be proud of, and actions that are even shameful to talk about. Now he is in a great company of boyz he has been friends with for 10 years, and now in 2023, he should think about lasting friendship until the end; otherwise, if he does something wrong, serious consequences await him."
 ENG_GATHERING_STORM_DESC: "Although Great Britain emerged victorious from the World War, the foundations of the great empire have been shaken. The flower of the nation perished in the trenches of Flanders and Northern France, and the Commonwealth of Nations is increasingly feverish due to giant debts.\n\nThe last war is still fresh in people's memory, and the country is already on the threshold of a new one. One thing is becoming increasingly obvious to all: in our time, there will be no peace."
 GNL_GATHERING_STORM_DESC: "The State of Independent People (abbr. GNL) - A state that does not influence events before the First Patsan War (hereinafter FPW), but does influence events during and after the FPW. Anyone can take the lead of the state and influence the course of the war."
 ILY_GATHERING_STORM_DESC: "Ilya was born in 2006. He's an ordinary, calm dude who loves playing HoI. Since 2022, Ilya has been in a strong friendship with the boyz. Stability is his strength. Only time will tell how the situation will develop further."
 NAN_GATHERING_STORM_DESC: "Since childhood, Nikita Andreev has loved playing World of Tanks. His sincere love for tanks causes jokes among the boyz. Andreev has a so-called 'second-grader syndrome.' This is when, as a teenager, you get excited and tell everyone uninteresting nonsense. Andreev also wants a girl who would bring him breakfast in bed."
 SAS_GATHERING_STORM_DESC: "Sasha is an ordinary schoolboy from Pskov. He loves playing HoI just like Ilya. He is in a friendly company of boyz who won't abandon him."
 NKD_GATHERING_STORM_DESC: "'I love Dota' - this can describe Nikita Kudinov in two words. Dota is his everything."
 KRL_GATHERING_STORM_DESC: "Kirill was born in 2007. He grew up in an ordinary family like all the other boyz. Kirill started hanging out with the boyz in 2020."
 GER_GATHERING_STORM_DESC: "A new Germany has risen. Three years have passed since the Weimar Republic was destroyed, and Hitler's Third Reich has replaced it. After years of decline, the economy has begun to recover, and unemployment and poverty are on the wane.\n\nThe military restrictions imposed on Germany by the Treaty of Versailles are long forgotten, and the Wehrmacht grows stronger day by day. A new world war looms on the horizon."
 ITA_GATHERING_STORM_DESC: "With the advent of fascism, Italy enters a glorious era. Its army is currently occupied with incorporating Ethiopia into the growing colonial empire, but Mussolini's ambitions do not end there.\n\nDominance in the Mediterranean region has always been Italy's destiny, and now a new world order is being established in Europe. When the tidal wave of change finally comes, Italy must be at its very crest, or be swept away."
 JAP_GATHERING_STORM_DESC: "The Japanese Empire stands at a crossroads. The 'Hokushin-ron' doctrine (northern expansion) is popular in the army and calls for the seizure of Siberia. The 'Nanshin-ron' doctrine of southern expansion is supported by the navy, aiming to seize the rich European colonies in Southeast Asia and the Pacific.\n\nAnd, of course, one must not forget about China. Japan has a well-trained army, but lacks resources for industrial development, and time is running out. Which path to choose?"
 SOV_GATHERING_STORM_DESC: "When the dust settled after the Civil War, the USSR found itself the sole master of the territories that had once comprised the Russian Empire. Rapid industrialization and collectivization were carried out at the cost of enormous human sacrifice.\n\nThe Soviet Union is now threatened by a resurgent Germany in the west and a militaristic Japan in the east. And, of course, one cannot discount the internal threat within the depths of the communist party..."
 USA_GATHERING_STORM_DESC: "The United States returned to a state of isolationism by the end of the First World War and briefly enjoyed an economic boom in the 20s. The Great Depression put a tragic end to that.\n\nAmerican policy of non-intervention in European affairs remains unwavering, but it is impossible not to feel the growing tension in Europe and Asia. Whether it wants it or not, this 'Great Neutral' may also be swept up in the maelstrom."
 OTHER_GATHERING_STORM_DESC: "Other countries, large and small, are not ready to passively hold their breath and wait for the outcome of a new global conflict. The last war largely redrew the world map, changing the balance of power, and now the major players are ready to repeat it. Everyone will have to make difficult decisions and find a balance between their ideals and cold pragmatism to influence what the world will become in the future."
 POL_GATHERING_STORM_DESC: "Divided between three empires for centuries, Poland has finally regained its independence. But its position is now precarious.\n\nTo its east is the Soviet Union, which has not forgotten the humiliating defeat in the Polish-Soviet War.\n\nTo its west is the German Führer, Adolf Hitler, who openly declares his desire to expand 'living space' and that the former German territories now part of Poland will be the first target of this plan."
 CAN_GATHERING_STORM_DESC: "Canada entered the Great War as an ordinary colony and emerged from it as a nation. Born in the mud of Passchendaele, Canada is taking its first timid steps on the world stage.\n\nThe future of this new nation is in question, as it has not yet recovered from the Great Depression, and is torn from within by contradictions between its English and French-speaking citizens."
 AST_GATHERING_STORM_DESC: "Australians wrote their names in the history books of the Great War with their blood. They remember the sacrifice made during the Dardanelles campaign, as well as the names of those who gave the orders.\n\nAustralia is now at a crossroads: remain loyal to its colonial masters in distant Europe, who will soon enter a new war, or focus on the threats that are much closer to its own shores?"
 SAF_GATHERING_STORM_DESC: "When the Great War began, many residents of South Africa did not want to fight on the side of their British masters. Throughout most of the Great War, the South African army chased German troops in their African colonies, but without much success.\n\nNow, clouds of a new war are on the horizon. As before, some South Africans believe the country should not fight Germany. Some are even convinced that it's time for the descendants of the Boers to strive for the freedom that was unavailable to their ancestors."
 NZL_GATHERING_STORM_DESC: "This tiny nation from the southern Pacific Ocean fought bravely in the Great War. Its army suffered heavy losses in the bloody battles for Gallipoli and on the Western Front. Nearly half of all men of military age fought abroad, and many did not return home.\n\nTwenty years after the end of the Great War, the citizens of New Zealand watch world events with anxiety, as this time the threat is much closer to their shores..."
 RAJ_GATHERING_STORM_DESC: "The pride of the British Crown, India, is a strange combination of imperial power and imperial helplessness. A small elite group of Britons rules a vast subcontinent inhabited by hundreds of millions of citizens. They form the backbone of the Indian army, which fought bravely in the Great War.\n\nIndians hoped the losses suffered in the war would help the country gain independence from Great Britain, but these dreams did not come true. A new conflict is brewing, and many believe it is time to gain freedom — at any cost."
 SWI_GATHERING_STORM_DESC: "Switzerland is unique among European nations. It is a multicultural and decentralized country based on the principles of mutual respect and support.\n\nSwitzerland's principled neutrality was maintained during the Great War, and seeing its horrors from afar, Switzerland realized the necessity of self-defense. Now, as the shadow of a new war looms ever closer, this peaceful nation must decide: whether to maintain neutrality and defend against occupiers with armed neutrality, form a forced alliance with one of the neighboring powers, or act preemptively and defeat enemies before they even contemplate an invasion."
 SWI_BLITZKRIEG_DESC: "Switzerland was in a difficult position even before the Anschluss, but now that the Third Reich has tasted early expansion into other German-speaking territories, there is a real danger that this peaceful Alpine nation could be next. Switzerland's absolute neutrality will now face an unprecedented test, and if things go wrong, its defenses will be tested as well."
 BLITZKRIEG_NAME: "The Beginning of the End"
 BLITZKRIEG_DESC: "Since 2024, Ilya has been communicating with his classmate Kira Sidorova. He liked her until he found out she had a boyfriend. But in 2025, everything turned upside down. On June 30th, Kira calls Ilya to come to her place. How events will unfold further is up to you to decide."