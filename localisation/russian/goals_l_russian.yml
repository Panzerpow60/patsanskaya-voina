 VIK_pitya:0 "Линия Пити"
 VIK_vidr:0 "План Видора"
 newfocus_56:0 "Уроки войны"
 newfocus_57:0 "Тотальный эндзиг"
 newfocus_58:0 "Отправить женщин на заводы!!!"
 SAS_komp:0 "Задротить в комп"
 SAS_komp_desc:0 "В то время как другие тратят время на сон, еду и 'социализацию', истинные стратеги знают:0 настоящее сражение происходит не на полях битв, а в виртуальном пространстве. Этот фокус откроет секретные пути цифровой реальности, где несколько нажатий клавиш стоят целой дивизии танков."
 SAS_newyear:0 "Новый год"
 SAS_newyear_desc:0 "Наступил Новый, 2023 год, будем надеется только на лучшее, и пусть наши мечты сбудутся!"
 SAS_skuka:0 "Скучная жизнь"
 SAS_skuka_desc:0 "В нашей жизни ничего особо не происходит. Цикл повторяется, живём от пятницы до пятницы, единственная наша радость это вкусняшки и игры"
 SAS_eblanit:0 "Слабо готовиться к ОГЭ"
 SAS_eblanit_desc:0 "Готовится к ОГЭ? Нахуй надо! Хуйня экзамен все сдали и мы сдадим, только дауны готовятся за год или пол года."
 SAS_gotovitsa:0 "Подготовиться к ОГЭ"
 SAS_gotovitsa_desc:0 "Готовится к ОГЭ? Конечно. От этого зависит наше будущее, в какую школу поступим и с каким аттестатом."
 SAS_oge2:0 "Херово сдать ОГЭ"
 SAS_oge2_desc:0 "Впринципе ожидаемо. Мы не занимались подготовкой поэтому и сдали все предметы на 3. Ну и ладно это не на тчо не повлияет в нашей жизни."
 SAS_oge1:0 "Хорошо сдать ОГЭ"
 SAS_oge1_desc:0 "Мы на заебись сдали ОГЭ! Родители дали нам бабок за хорошую учебу, да и насторение лучше стало. Теперь мы можем поступить куда захотим с аттестатом 4,5!"
 SAS_leto:0 "Хорошо провести лето"
 SAS_leto_desc:0 "Ох уж это лето, беззаботное, каждый день играть в доту, касание, козла да и фрешбар по 33 рубля. Не прелесть же?"
 SAS_dacha:0 "Работать на даче"
 SAS_dacha_desc:0 "Но совсем прохлаждаться нельзя. Каждые выходные мы едем на дачу с ночевкой, чтобы строить беседку, да и родителям помогать по другим делам."
 SAS_10klass:0 "10 класс"
 SAS_10klass_desc:0 "Ебаный 10 класс... Мы так хотели пойти в колледж на сварщика, но родители были крайне против, теперь нам придется терпеть всё, или же попробовать уйти с 10 класса?"
 SAS_vsoploho:0 "Всё плохо..."
 SAS_vsoploho_desc:0 "Всё плохо. Завал по учебе, настроения нет, куча незнакомых людей, жизнь опять становится бесконечным циклом от пятницы до пятницы"
 SAS_motivation1:0 "Упор на зал"
 SAS_motivation1_desc:0 "Единственное что меня спасает сейчас это тренировки в зале. Там я забываю о том что происходит в жизни, плохие оценки, ссоры. Если бы не зал..."
 SAS_motivation2:0 "Разговор с Виталием"
 SAS_motivation2_desc:0 "После очередной тренировки в 9 вечера я встретился со своим бывшим тренером а сауне. Я рассказал ему все о своих проблемах. Он дал важные жизненные советы после которых я чувствовал, что не все так плохо в этой жизни"
 SAS_2024:0 "2024"
 SAS_2024:0 "Наступил Новый, 2024 год, будем надеется только на лучшее, и пусть наши мечты сбудутся!"
 SAS_richkrestiane_desc:0 "Реформы дали плоды — фабрики начали работать, торговля процветает, а казна пополняется. Но за этот рывок вперед заплатили те, кто веками кормил страну:0 крестьяне. Резкие изменения пагубно повлияли на мораль населения. Многие обанкротились, неуспев в погоне за изменениями."
 SAS_druzhba:0 "Укрепить дружбу с одноклассниками"
 SAS_druzhba_desc:0 "Мы познакомились с такими людьми как:0 Шевля, Кирилл Комов, Дима Рыбаков, Арсений Арутюнов. Все они хорошие ребята и поддерживают с нами разговор и общение на любую тему."
 SAS_sigma:0 "Сигма"
 SAS_sigma_desc:0 "Сигма — это социальный архетип, мужчина, который нарушает иерархию альфа/бета, но не бунтует против неё открыто. Он не лидер (альфа) и не последователь (бета)."
 SAS_smiritsa:0 "Конец депрессии!"
 SAS_smiritsa_desc:0 "Конец депрессии! Мы полностью смирились с ситуацией и стали принимать себя такими, какими мы явлеяемся."
 SAS_leto2024:0 "Лето 2024 года"
 SAS_leto2024_desc:0 "Самое обычное лето, играем в касание, едим шаурму, гуляем до полуночи и наслаждаемся житкой."
 SAS_dr:0 "Отметить день рождения"
 SAS_dr_desc:0 "В этом году мы отметили др на речке с шашылками и друзьями, было весело."
 SAS_bestleto:0 "Лучшее лето"
 SAS_bestleto_desc:0 "Это лето поистине уникально, куча новых друзей, первая подработка, полет в Турцию и офигенно отмеченное др."
 SAS_11klass:0 "11 класс"
 SAS_11klass_desc:0 "11 класс - финальный бросок перед поступлением в университет и началом новой жизни."
 SAS_seriali:0 "Смотреть сериалы"
 SAS_seriali_desc:0 "Сериалы — это произведения кино, состоящие из нескольких частей, объединенных общим сюжетом, персонажами или тематикой. Они предназначены для длительного показа, часто имеют открытый сюжет или параллельно развивающиеся линии. Сериалы могут быть многосерийными, мини-сериалами."
 SAS_brba:0 "Посмотреть "Во все тяжкие""
 SAS_brba_desc:0 "«Во все тяжкие» — культовый американский сериал, рассказывающий об учителе химии Уолтере Уайте, который из-за смертельной болезни начинает производить метамфетамин, чтобы обеспечить семью. Это история превращения обычного человека в жестокого наркобарона,занесенная в Книгу рекордов Гиннесса."
 SAS_bcs:0 "Посмотреть "Лучше звоните Солу""
 SAS_bcs_desc:0 " Это блестящая, остроумная и глубокая история о том, как хороший парень решает, что быть «хорошим» просто невыгодно, и с головой погружается в мир полутонов, а затем и откровенной тьмы. Идеальное сочетание приквела, который стоит как отдельное произведение искусства."
 SAS_dexter:0 "Посмотреть "Декстер""
 SAS_dexter_desc:0 " Декстер — американский телесериал, основанный на романе Джеффри Линдсея «Дремлющий демон Декстера» и адаптированный для телевидения лауреатом премии «Эмми», сценаристом Джеймсом Маносом-мл. События сериала рассказывают о Декстере Моргане, вымышленном серийном убийце, работающем судебным экспертом по брызгам крови в полиции Майами."
 SAS_literallyme:0 "Выбрать литтерали персонажа"
 SAS_literallyme_desc:0 "«Literally me» — это интернет-мем, обозначающий персонажей кино или игр, с которыми пользователи (чаще всего молодые люди) себя ассоциируют из-за схожего экзистенциального кризиса, депрессии, одиночества или асоциального поведения. Персонажи часто несут «тяжёлый груз» и подавлены, а мем используется для самоидентификации."
 SAS_ege:0 "Подготовка к ЕГЭ"
 SAS_ege_desc:0 "ЕГЭ — это основная форма государственной итоговой аттестации (ГИА) по образовательным программам среднего общего образования в России, проводимая для выпускников 11 классов. Экзамен выполняет две функции: служит выпускным экзаменом в школе и вступительным испытанием в вузы."
 SAS_zd:0 "Железная дорога до Аргонского леса"
 SAS_zd_desc:0 "Аргонский лес - очень важный лес в регионе. Он имеет густую лесистую местность и железнодорожное сообщение. Но оно было разрушено во времена Первой мировой войны. Аргонский лес даже был помещен как пользовательская карта в игре Battlefield 1 2016 года, отчего он имеет большую популярность. Нужно улучшить данный регион"
 SAS_selhoz:0 "Реформа сельхоза"
 SAS_selhoz_desc:0 "Земля кормит армию. Земля кормит заводы. Земля кормит страну. Но наша земля работает вполсилы. Половина крестьян пашет сохой, доставшейся от дедов. Вторая половина ушла в город и забыла дорогу обратно. Урожаи падают, цены на хлеб растут, а мы всё думаем, как накормить солдат. Пора перетрясти деревню.
 SAS_zhdsily:0 "Проект "Дружба""
 SAS_zhdsily_desc:0 "Начало проекта "Дружба" берет свое начало в 2015 году. Тогда Илья и Саша подписали соглашение о экономической взаимопомощи. По плану еще не осуществлена железнодорожная связь между двумя государствами. Нужно предложить Илье построить Ж/Д дорогу"
 SAS_promm:0 "Развитие промышленности"
 SAS_promm_desc:0 " Станки скрипят, конвейеры стоят. Наши заводы устарели на два десятилетия, а конкуренты уже запускают автоматизированные линии. Пора не просто строить — пора перестраивать. Мы создадим фабрики, которые будут производить технику быстрее, чем враги успеют её подбить."
 SAS_promm1:0 "Постройка радиотехнической фабрики"
 SAS_promm1_desc:0 "Война будущего будет вестись не только в окопах, но и в эфире. Самолёты без радаров — слепые птицы, танки без радио — беспомощные железные мишени. Пора создавать производство, которое даст нашим войскам «уши» и «глаза». Секретный завод станет кузницей нашей радиотехнической мощи."
 SAS_promm2:0 "Построить новейший хлебобулочный завод"
 SAS_promm2_desc:0 "Пока генералы думают о снарядах, солдаты думают о хлебе. Армия марширует на желудке, и наш долг — обеспечить фронт и тыл не просто пайком, а качественным, питательным хлебом. Новейший автоматизированный хлебозавод станет символом нашего заботы о народе и залогом стабильности в трудные времена."
 SAS_localproduction:0 "Развитие местного производства"
 SAS_localproduction_desc:0 "Солдат без патрона — мишень. Танк без снаряда — железная коробка. Пока мы закупаем боеприпасы у союзников и тянем их через огромные расстояния, наша армия скована в своих действиях. Пора создавать собственную сеть производств боеприпасов в каждом регионе. Чтобы каждый снаряд, каждая гильза рождалась в сотне километров от фронта, а не в тысяче."
 SAS_krestianskiyvopros:0 "Крестьянский вопрос"
 SAS_krestianskiyvopros_desc:0 "Невозможно строить будущее на плуге. Но и нельзя строить его на голодных бунтах. Миллионы крестьян держат страну на своих плечах. Мы стоим на историческом перепутье: либо превратим крестьян в рабочих,либо найдём путь, где трактор и домна поднимут её. Это не просто реформа — это социальная революция."
 SAS_nokrestiane:0 "Избавиться от них"
 SAS_nokrestiane_desc:0 "История не спрашивает разрешения. Она ставит ультиматум: или мы создадим промышленность за пять лет, или нас сотрут с карты мира за пять дней. Деревня с её вековой косностью — балласт на пути прогресса. Нет времени на уговоры, нет ресурсов на компенсации."
 SAS_raskulachivanie:0 "Раскулачивание"
 SAS_raskulachivanie_desc:0 "Кулак сжимает горло деревни. Пока «деревенская буржуазия» прячет хлеб и спекулирует зерном, рабочие на стройках пятилетки голодают. Пора разжать эти пальцы. Конфискация излишков, передача имущества колхозам — это не жестокость, это операция по спасению нации. Тракторы должны пахать, а не ржаветь в сараях у мироедов!"
 SAS_yeskrestiane:0 "Поддержка крестьян"
 SAS_yeskrestiane_desc:0 "Заводы не должны вырастать на костях деревни. Пока одни предлагают выжать из крестьян последнее зерно, мы выбираем иной путь. Сельское хозяйство — фундамент государства. Дадим деревне трактора вместо конфискаций, школы вместо раскулачивания. Промышленность и деревня могут развиваться вместе — если не забывать, что хлеб важнее стали."
 SAS_richkrestiane:0 "Сашино экономическое чудо"
 SAS_richkrestiane_desc:0 "Пока города лежат в руинах, а фабрики молчат, истинное богатство страны дремлет в её деревнях. Не кредиты и не импортные станки спасут экономику — спасёт трудолюбивая рука крестьянина, который накормит страну, даст сырьё фабрикам и станет первым покупателем их товаров. Мы построим экономику, где трактор ценнее танка."
 SAS_bunkerevlesu:0 "Бункеры в Аргонском лесу"
 SAS_bunkerevlesu_desc:0 "Пока дипломаты ведут переговоры, солдаты должны готовиться к худшему. Густые леса на границе с агрессивным соседом — не просто природный ландшафт. Это идеальное место для создания крепости, где наши войска переждут первый, самый страшный удар. Под соснами и елями мы построим не бункеры — построим ловушку для целой армии."
 SAS_vitya:0 "Ситуация с Витей"
 SAS_vitya_desc:0 "Витя начал проявлять какую-то хуйню, мы должны разобраться в ситуации и конечно же готовится к худшему."
 SAS_prizov:0 "Набрать добровольцев"
 SAS_prizov_desc:0 "Враг у ворот. Переговоры провалены, ультиматумы отвергнуты. Настал час, когда каждый мужчина должен взять винтовку, каждая женщина — заменить его у станка, каждый завод — перейти на военные рельсы. Мы не объявляем мобилизацию — мы объявляем, что Отечество в опасности. Вся нация — армия."
 SAS_armyreform:0 "Реформа армии"
 SAS_armyreform_desc:0 "Армия — это зеркало государства. Реформа — это замена мозга. Отказаться от почётных, но бесполезных традиций. Расстрелять вороватых интендантов. Сжечь уставы, написанные для прошлой войны. Купить технологии у врагов. Создать армию не для парадов, а для убийства."
 SAS_doctrine:0 "Улучшение доктрины"
 SAS_doctrine_desc:0 "Уставы пишутся кровью. Но кровь прошлой войны уже высохла на бумаге. Пока командиры зубрят мантры о штыковых атаках и каре, враг учит танкистов резать коммуникации, а лётчиков — жечь землю напалмом. Обновление устава — это не переписывание параграфов. Это смена мышления. Отказ от „как было“ в пользу „как будет“."
 SAS_homedef_desc:0 "Когда говорят пушки — законы молчат. Но есть закон выше всех законов — закон крови и почвы. Отечество в опасности. Время собирать камни. И эти камни мы сложим в стену. Стену из тел, если надо. Стену из воли. Стену, о которую сломаются зубы у любой армии мира. Потому что за этой стеной — наши дома, наши могилы, наша память."
 SAS_andreev:0 "Андреев под нашим контролем"
 SAS_andreev_desc:0 "Теперь когда Андреев под нашим контролем мы можем навязывать свою политику, и выкачивать с него людей и полезные ресурсы взамен на инвестиции и технологии."
 SAS_highcommand:0 "Военное сотрудничество"
 SAS_highcommand_desc:0 "Наши интересы простираются дальше наших границ. Протекторат — не просто подопечная территория, это наш стратегический плацдарм, наша живая броня. Их солдаты должны сражаться по нашим уставам, их заводы — клепать наше оружие, их земля — стать неприступным бастионом. Создадим единую военную машину. Пусть враг думает, что нападает на слабого вассала."
 SAS_zavodizagran:0 "Заводы зарубежом"
 SAS_zavodizagran_desc:0 "Границы — условность для капитала и технологий. Пока наши заводы уязвимы для бомбардировок или санкций, умная держава сажает промышленные семена на чужой почве. Мы будем строить фабрики там, где дешёвая рабочая сила, там, где нейтралитет защитит от войны, там, где сырьё лежит под ногами."
 SAS_sdelka:0 "Выгодные сделки"
 SAS_sdelka_desc:0 "Наш протекторат — не благотворительная организация, а актив, который должен приносить дивиденды. Мы защищаем их — они платят. Мы инвестируем — они возвращают с процентами. Мы даём технологии — они дают ресурсы и кровь своих солдат. Пора перевести наши „особые отношения“ на язык контрактов, где каждая услуга имеет цену, каждая уступка — компенсацию, а каждая победа — свою долю в трофеях. Война — дело дорогое. Пусть платит тот, кто больше нуждается в защите."
