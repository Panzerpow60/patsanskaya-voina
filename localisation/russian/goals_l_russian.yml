 ILY_1stwar_desc:0 "ВНИМАНИЕ! НАЧАЛО БОЕВЫХ ДЕЙСТВИЙ.\nВ 6:36 по местному времени силы Вити пересекли границу в районе улицы Михайловской. Артиллерийский обстрел предшествовал выдвижению мотопехоты. Противник, судя по всему, рассчитывает на эффект внезапности. Однако наши доблестные войска уже заняли оборонительные рубежи. Приказ: стоять до победного. Победа будет за нами."
 ILY_MVD1_desc:0 "Создание мощного территориального органа внутренних дел обеспечит порядок в тылу и ужесточит политику на захваченных землях. Любая попытка сопротивления будет подавлена на корню, а лояльность населения — ускорена силой приказа."
 ILY_niggerfaggot2_desc:0 "Назревает конфликт низкой интенсивности на районе. Витя явно перешел красные линии. Единственный способ сохранить баланс сил — подписать пакт о взаимопомощи с ключевыми лидерами: Саней, Никитой Кудиновым и Никитой Андреевым. Вместе мы сила. Вместе — Антивикторовская коалиция."
 ILY_goododnogr_desc:0 "Игра идет, Витя на подходе, тут звонок — Кира! "Ты где? Приезжай". Все, GG WP, ребята, расходимся. У меня дела поважнее, чем Крепость Фао. Отношения важнее рейтинга."
 ILY_bezotn_desc:0 "Иногда в жизни приходится делать трудный выбор: любовь или долг. Илья выбрал долг. Долг перед тиммейтами. Долг перед клатчем. Долг перед Battlefield 1. Кира? Да ну ее в пень."
 
 
 
