l_russian:
 LOADING_TIP_0: ""То есть тебе было похуй на нас?" \n «Да, мне было похуй на вас».\n- Виктор Жемчугов пацанам 1 мая 2024 года"
 LOADING_TIP_1: "«Я человек особенный я блять тот еще ебанутый».\n- Виктор Жемчугов 1 мая 2024 года"
 LOADING_TIP_2: "«Не важно сколько у тебя девушек а важно сколько у тебя дивизий».\n- Неизвестный автор"
 LOADING_TIP_3: "«При мне такой хуйни не было».\n- Иосиф Сталин в группе 9Б класса в Вконтакте"
 LOADING_TIP_4: "«Петербург плачет дождём, когда люди плачут тишиной»"
 LOADING_TIP_5: "Владимир Путин - огурец.\n- Никита Андреев"
 LOADING_TIP_6: "А чисто гипотетически если Витя расстанется с Ришей, то он 100% сопьется и натворит какую то хуйню похуже того что было в мае \n- Илья и Саня во время разговора в зале (дата неизвестна)"
 LOADING_TIP_7: "Блять вы мне мешаете спать. Мне снилось как деревья смеются. \n- Никита Андреев в ночь с 31 августа на 1 сентября 2024 года" 
 LOADING_TIP_8: "Любовь - это дипломатия в которой нет гарантий и нет перемирий"
 LOADING_TIP_9: "Я не буду давать НИКАКИХ гарантий безопасности по поводу всей этой ситуации. Я строил нормальные отношения но ты рушила всё по киричику. Я честный человек и я буду говорить всё как было и как есть \n-Илья 17.10.2025"
 LOADING_TIP_10: "Я трезвый как стекло \n Саня 1 января 2025 года"
 LOADING_TIP_11: ""Сын ебёт отца. Так всегда было." \n -Никита Андреев 10 июля 2025 года"
 LOADING_TIP_12: "«В коммуналке, но в центре Санкт-Петербурга лучше жить чем в Кудрово» \n-Кира Сидорова, 26 августа 2025 года"
 LOADING_TIP_13: "А я здесь живу. И хочу, чтобы в этой стране всё было как-то нормально. Чтобы мода была нормальная, а не от Славы Зайцева. Чтобы жизнь была нормальной. Чтобы Спартак с Зенитом блять, играли, как Интер с Миланом. Допускаю, что большей части населения всё это нахер не нужно.\n-Данила Козловский, фильм ДухLess"
 LOADING_TIP_14: "Витя сам начал пиздеть. Если он пиздабол, то он должен понимать как к нему относятся. Если человек пиздит, он должен понимать что друзья будут к нему относиться как к тотальному пиздаболу \n -Никита Кудинов разговаривая с Ильёй после ситуации с Витей 15.06.2024 02:45"
 LOADING_TIP_15: "Сегодня утром мы проснулись от громких криков Вити и автоматных очередей. Началась война на улице Михайловской. Витя начал данную кровопролитную войну за свои интересы. Он бросил нас, пацанов. Променял на каких-то женщин и левых пацанов. Все кто сейчас с нами, боритесь, вставайте против него. Ведь наша жизнь и под угрозой. \n -Илья в утреннем обращении к пацанам 2 мая 2024 в 7:30"
 LOADING_TIP_16: "Я твой единственный друг, а это всего лишь бабки! бабки, бабки, сука, бабки! Патологически жадный, сука! \n -Данила Козловский"
 LOADING_TIP_17: "«Петербург учит одному: красота и боль идут рядом, как река и набережная»"
 LOADING_TIP_18: "«Самое правильное при расставании — уйти» \n-Эрих Мария Ремарк, 1945 год."
 LOADING_TIP_19: "«Если твои друзья остаются с тобой, то ты — счастливчик, потому что со мной такого никогда не случалось.» \n -Ронни Дио"
 LOADING_TIP_20: "«200.000 солдат Вити сейчас стоят на наших границах. Витя, остановись! Ещё можно разрешить этот кризис рано или поздно.» \n-Илья на совете пацанов 30.04.2024"
 


