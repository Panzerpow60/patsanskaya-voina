 ILY_fimoser_desc: "Brian Moser is a character from the TV series 'Dexter' (2006-2013)."
 ILY_jessy: "Jesse Pinkman"
 ILY_jessy_desc: "Jesse Pinkman is a character from the American drama series 'Breaking Bad' and the feature film 'El Camino: A Breaking Bad Movie'. The character, played by Aaron Paul, was created by the series' writer and director Vince Gilligan, and is also the only character besides Walter White to appear in every episode of the series."
 ILY_landa: "Hans Landa"
 ILY_landa_desc: "Standartenführer Hans Landa is the main antagonist in Quentin Tarantino's 2009 film 'Inglourious Basterds'. He was portrayed by Austrian actor Christoph Waltz, who received widespread acclaim and numerous awards for his performance."
 ILY_kira1: "The Situation with Kira"
 ILY_kira1_desc: "The history of Ilya's communication with Kira Sidorova begins in the spring of 2024.\nOften in computer science classes, Kira would constantly ask Ilya for help. In the summer of 2024, when Ilya was still in St. Petersburg, they communicated frequently; then, upon his return to Pskov, they hung out and were friends. Just friends! Nothing else! But everything went awry.\nIn May 2025, Kira invites Ilya over to her place. He never expected to hear that, especially from Kira. And who knows what will happen between them. The beginning of a relationship or just an ordinary evening at her place?"
 ILY_may2025: "Working at Dodo Pizza"
 ILY_industry1: "The Beginning of Economic Development"
 ILY_industry2: "New Stores on Mikhaylovskaya Street"
 ILY_industry2_desc: "For successful economic development, we need to open new stores and enterprises on Mikhaylovskaya Street."
 ILY_millitary1: "Development of the Military Industry"
 ILY_millitary1_desc: "In the 1990s, the 'Borisovichi' plant was a military factory that produced tanks for the 76th Division. It was later closed due to crises in the country. Now we need to reconstruct it to start tank production."
