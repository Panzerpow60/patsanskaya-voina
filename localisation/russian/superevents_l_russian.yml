 SE_1st_patsaniwar_title:0 "Первая пацанская война"
 SE_1st_patsaniwar_body:0 "Так называемые правящие классы не могут оставаться долго без войны. Без войны они скучают, праздность утомляет, раздражает их, они не знают, для чего живут, едят друг друга, стараются наговорить друг другу побольше неприятностей, по возможности безнаказанно, и лучшие из них изо всех сил стараются, чтобы не надоесть друг другу и себе самим. Но приходит война, овладевает всеми, захватывает, и общее несчастье связывает всех. \n Эрих Мария Ремарк"
 SE_1st_patsaniwar_remark:0 "\n Началось"
 SE_kiravstr_title:0 "Возобновление отношений с Кирой"
 SE_kiravstr_body:0 "Человеческая жизнь тянется слишком долго для одной любви. Просто слишком долго. Любовь чудесна. Но кому-то из двух всегда становится скучно. А другой остаётся ни с чем. Застынет и чего-то ждёт… Ждёт, как безумный… \n Эрих Мария Ремарк"
 SE_kiravstr_remark:0 "\n Да что у них происходит?!"
 SE_kirarast_title:0 "Расставание с Кирой"
 SE_kirarast_body:0 "«Нам надо расстаться. Лучше быть несчастным без тебя, чем с тобой». Фредерик Бегбедер. Произведение «Любовь живет три года»"
 SE_kirarast_remark:0 "\n Прощай, мы расстаёмся навсегда. Под белым небом января"
 SE_kudrovowar_title:0 "Битва за Кудрово"
 SE_kudrovowar_body:0 "«Кудрово? Серьёзно, блять? Ее подруги реально думают, что эта меркантильная мразь которая шляется по клубам защитит столицу? Мы и не с такого дерьма выбирались! Передайте всем: пленных не брать. Расстреливать всех до единого. Выезжаем. И прихватите те штуки, что мы у Вити купили. Пора показать Кире, чего стоют слова про бывшего».\n-Илья, 25 августа 2025 года 07:55"
 SE_kudrovowar_remark:0 "\nКудрово зальётся кровью"
