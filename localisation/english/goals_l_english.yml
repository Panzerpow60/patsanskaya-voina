 SAS_komp: "No-Life the Computer"
 SAS_komp_desc: "While others waste time on sleep, food, and 'socializing,' true strategists know: the real battle happens not on the battlefields, but in the virtual space. This focus will unlock secret paths of digital reality, where a few keystrokes are worth an entire tank division."
 SAS_newyear: "New Year"
 SAS_newyear_desc: "The New Year 2023 has arrived, let's hope for the best, and may our dreams come true!"
 SAS_skuka: "Boring Life"
 SAS_skuka_desc: "Nothing much happens in our life. The cycle repeats, we live from Friday to Friday, our only joy is snacks and games."
 SAS_eblanit: "Barely Prepare for the OGE"
 SAS_eblanit_desc: "Prepare for the OGE? The hell I will! It's a shitty exam, everyone passed it and we will too. Only idiots prepare a year or six months in advance."
 SAS_gotovitsa: "Prepare for the OGE"
 SAS_gotovitsa_desc: "Prepare for the OGE? Of course. Our future depends on it, which school we get into and with what grades."
 SAS_oge2: "Fail the OGE"
 SAS_oge2_desc: "Basically expected. We didn't prepare, so we got 3s (Cs) in all subjects. Oh well, it won't affect our lives anyway."
 SAS_oge1: "Pass the OGE Well"
 SAS_oge1_desc: "We passed the OGE fucking great! Our parents gave us money for doing well in school, and our mood is better. Now we can get into any college we want with a 4.5 GPA (B+ average)!"
 SAS_leto: "Have a Good Summer"
 SAS_leto_desc: "Oh, this summer, carefree, playing Dota, Tag, Kozel (a card game) every day, and even FreshBar for 33 rubles. Isn't it lovely?"
 SAS_dacha: "Work at the Dacha"
 SAS_dacha_desc: "But you can't just slack off completely. Every weekend we go to the dacha overnight to build a gazebo and help parents with other chores."
 SAS_10klass: "10th Grade"
 SAS_10klass_desc: "Fucking 10th grade... We wanted to go to college to become a welder, but our parents were totally against it. Now we have to endure it all, or maybe try to leave after 10th grade?"
 SAS_vsoploho: "Everything is Bad..."
 SAS_vsoploho_desc: "Everything is bad. Swamped with studies, no mood, a bunch of unfamiliar people, life is becoming an endless cycle from Friday to Friday again."
 SAS_motivation1: "Focus on the Gym"
 SAS_motivation1_desc: "The only thing saving me right now is working out at the gym. There I forget about what's happening in life, bad grades, arguments. If it weren't for the gym..."
 SAS_motivation2: "Talk with Vitaly"
 SAS_motivation2_desc: "After another workout at 9 PM, I met my former trainer in the sauna. I told him all about my problems. He gave me important life advice, after which I felt that not everything in this life is so bad."
 SAS_2024: "2024"
 SAS_2024: "The New Year 2024 has arrived, let's hope for the best, and may our dreams come true!"
 SAS_richkrestiane_desc: "The reforms have borne fruit—factories have started working, trade is flourishing, and the treasury is being replenished. But those who fed the country for centuries paid for this leap forward: the peasants. The abrupt changes have had a detrimental effect on the morale of the population. Many went bankrupt, unable to keep up with the changes."
 SAS_druzhba: "Strengthen Friendship with Classmates"
 SAS_druzhba_desc: "We met people like: Shevlya, Kirill Komov, Dima Rybakov, Arseny Arutyunov. They are all good guys and engage in conversation and communication with us on any topic."
 SAS_sigma: "Sigma"
 SAS_sigma_desc: "A sigma is a social archetype, a man who disrupts the alpha/beta hierarchy but does not openly rebel against it. He is neither a leader (alpha) nor a follower (beta)."
 SAS_smiritsa: "End of Depression!"
 SAS_smiritsa_desc: "End of depression! We've fully come to terms with the situation and started accepting ourselves for who we are."
 SAS_leto2024: "Summer 2024"
 SAS_leto2024_desc: "The most ordinary summer, playing tag, eating shawarma, walking until midnight and enjoying life."
 SAS_dr: "Celebrate a Birthday"
 SAS_dr_desc: "This year we celebrated our birthday by the river with barbecue and friends, it was fun."
 SAS_bestleto: "Best Summer"
 SAS_bestleto_desc: "This summer is truly unique, tons of new friends, first part-time job, a flight to Turkey, and an amazingly celebrated birthday."
 SAS_11klass: "11th Grade"
 SAS_11klass_desc: "11th grade - the final push before entering university and starting a new life."
 SAS_seriali: "Watch TV Series"
 SAS_seriali_desc: "TV series are cinematic works consisting of several parts, united by a common plot, characters, or theme. They are intended for long-term viewing, often having an open-ended plot or parallel storylines. Series can be multi-episode or mini-series."
 SAS_brba: "Watch 'Breaking Bad'"
 SAS_brba_desc: "'Breaking Bad' is a cult American series about a chemistry teacher, Walter White, who, due to a terminal illness, starts producing methamphetamine to provide for his family. It's a story of an ordinary man's transformation into a ruthless drug lord, listed in the Guinness World Records."
 SAS_bcs: "Watch 'Better Call Saul'"
 SAS_bcs_desc: "It's a brilliant, witty, and profound story about how a good guy decides that being 'good' just doesn't pay off, and he plunges headlong into a world of gray areas, and then outright darkness. The perfect combination of a prequel that stands on its own as a work of art."
 SAS_dexter: "Watch 'Dexter'"
 SAS_dexter_desc: "Dexter is an American television series based on the novel 'Darkly Dreaming Dexter' by Jeff Lindsay, adapted for television by Emmy Award-winning screenwriter James Manos Jr. The series follows Dexter Morgan, a fictional serial killer who works as a blood spatter analyst for the Miami Police Department."
 SAS_literallyme: "Choose a Literally Me Character"
 SAS_literallyme_desc: "'Literally me' is an internet meme referring to movie or game characters with whom users (most often young men) identify due to a similar existential crisis, depression, loneliness, or antisocial behavior. The characters often carry a 'heavy burden' and are depressed, and the meme is used for self-identification."
 SAS_ege: "Preparation for the Unified State Exam"
 SAS_ege_desc: "The Unified State Exam is the main form of state final attestation for secondary general education programs in Russia, taken by 11th-grade graduates. The exam serves two functions: as a school leaving exam and as an entrance exam for universities."
 SAS_zd: "Railway to the Argonne Forest"
 SAS_zd_desc: "The Argonne Forest is a very important forest in the region. It has dense woodland and a railway connection. But it was destroyed during the First World War. The Argonne Forest was even featured as a custom map in the 2016 game Battlefield 1, which makes it very popular. This region needs to be improved."
 SAS_selhoz: "Agricultural Reform"
 SAS_selhoz_desc: "The land feeds the army. The land feeds the factories. The land feeds the country. But our land is working at half strength. Half the peasants plow with the wooden plows handed down from their grandfathers. The other half went to the city and forgot the way back. Harvests are falling, bread prices are rising, and we're still wondering how to feed the soldiers. It's time to shake up the village."
 SAS_zhdsily: "Project 'Druzhba'"
 SAS_zhdsily_desc: "The beginning of the 'Druzhba' (Friendship) project dates back to 2015. That's when Ilya and Sasha signed an agreement on economic mutual assistance. According to the plan, the railway connection between the two states has not yet been completed. We need to propose to Ilya to build a railway."
 SAS_promm: "Industrial Development"
 SAS_promm_desc: "The machines are creaking, the conveyors are stopped. Our factories are two decades behind, while competitors are already launching automated lines. It's time not just to build—it's time to rebuild. We will create factories that produce equipment faster than the enemy can knock it out."
 SAS_promm1: "Construction of a Radio-Technical Factory"
 SAS_promm1_desc: "The war of the future will be fought not only in the trenches but also on the airwaves. Planes without radars are blind birds, tanks without radios are helpless iron targets. It's time to create an industry that will give our troops 'ears' and 'eyes'. The secret plant will become the forge of our radio-technical power."
 SAS_promm2: "Build a State-of-the-Art Bakery"
 SAS_promm2_desc: "While generals think about shells, soldiers think about bread. An army marches on its stomach, and it's our duty to provide the front and rear not just with rations, but with quality, nutritious bread. The newest automated bakery will be a symbol of our care for the people and a guarantee of stability in difficult times."
 SAS_localproduction: "Development of Local Production"
 SAS_localproduction_desc: "A soldier without a cartridge is a target. A tank without a shell is a metal box. While we buy ammunition from allies and haul it over vast distances, our army is constrained in its actions. It's time to create our own network of ammunition production in every region. So that every shell, every cartridge case is born a hundred kilometers from the front, not a thousand."
 SAS_krestianskiyvopros: "The Peasant Question"
 SAS_krestianskiyvopros_desc: "It is impossible to build a future on a plow. But you cannot build it on hungry riots either. Millions of peasants hold the country on their shoulders. We stand at a historical crossroads: either we turn the peasants into workers, or we find a path where the tractor and the blast furnace will lift it up. This is not just a reform—it's a social revolution."
 SAS_nokrestiane: "Get Rid of Them"
 SAS_nokrestiane_desc: "History does not ask for permission. It presents an ultimatum: either we build an industry in five years, or we will be erased from the world map in five days. The village with its age-old stagnation is ballast on the path of progress. No time for persuasion, no resources for compensation."
 SAS_raskulachivanie: "Dekulakization"
 SAS_raskulachivanie_desc: "The kulak's fist tightens around the village's throat. While the 'village bourgeoisie' hides bread and speculates in grain, the workers on the Five-Year Plan construction sites are starving. It's time to unclench those fingers. Confiscation of surplus, transfer of property to collective farms—this is not cruelty, it's an operation to save the nation. Tractors should plow, not rust in the barns of the parasites!"
 SAS_yeskrestiane: "Support the Peasants"
 SAS_yeskrestiane_desc: "Factories should not rise on the bones of the village. While some propose squeezing the last grain from the peasants, we choose a different path. Agriculture is the foundation of the state. Let's give the village tractors instead of confiscations, schools instead of dekulakization. Industry and the village can develop together—if we don't forget that bread is more important than steel."
 SAS_richkrestiane: "Sasha's Economic Miracle"
 SAS_richkrestiane_desc: "While cities lie in ruins and factories are silent, the true wealth of the country slumbers in its villages. Not loans or imported machine tools will save the economy—it will be saved by the hardworking hand of the peasant, who will feed the country, provide raw materials for factories, and become the first buyer of their goods. We will build an economy where a tractor is more valuable than a tank."
 SAS_bunkerevlesu: "Bunkers in the Argonne Forest"
 SAS_bunkerevlesu_desc: "While diplomats negotiate, soldiers must prepare for the worst. The dense forests on the border with an aggressive neighbor are not just a natural landscape. This is an ideal place to create a fortress where our troops can wait out the first, most terrible blow. Under the pines and firs, we will build not just bunkers—we will build a trap for an entire army."
 SAS_vitya: "The Situation with Vitya"
 SAS_vitya_desc: "Vitya has started pulling some bullshit. We need to figure out the situation and, of course, prepare for the worst."
 SAS_prizov: "Enlist Volunteers"
 SAS_prizov_desc: "The enemy is at the gates. Negotiations have failed, ultimatums have been rejected. The hour has struck when every man must take up a rifle, every woman must take his place at the machine, every factory must switch to a war footing. We are not declaring mobilization—we are declaring that the Fatherland is in danger. The whole nation is an army."
 SAS_armyreform: "Army Reform"
 SAS_armyreform_desc: "The army is a mirror of the state. Reform is a brain transplant. Abandon honorable but useless traditions. Shoot corrupt quartermasters. Burn the regulations written for the last war. Buy technology from enemies. Create an army not for parades, but for killing."
 SAS_doctrine: "Doctrine Improvement"
 SAS_doctrine_desc: "Regulations are written in blood. But the blood of the last war has already dried on the paper. While commanders drill mantras about bayonet charges and squares, the enemy teaches tankers to cut communications and pilots to scorch the earth with napalm. Updating the regulations is not rewriting paragraphs. It's a change in mindset. Abandoning 'how it was' in favor of 'how it will be'."
 SAS_homedef_desc: "When the cannons speak, the laws are silent. But there is a law above all laws—the law of blood and soil. The Fatherland is in danger. Time to gather stones. And these stones we will build into a wall. A wall of bodies, if necessary. A wall of will. A wall that will break the teeth of any army in the world. Because behind this wall are our homes, our graves, our memory."
 SAS_andreev: "Andreev Under Our Control"
 SAS_andreev_desc: "Now that Andreev is under our control, we can impose our policies, extract people and useful resources from him in exchange for investments and technology."
 SAS_highcommand: "Military Cooperation"
 SAS_highcommand_desc: "Our interests extend beyond our borders. The protectorate is not just a ward territory; it's our strategic springboard, our living armor. Their soldiers must fight according to our regulations, their factories must churn out our weapons, their land must become an impregnable bastion. Let's create a unified military machine. Let the enemy think they are attacking a weak vassal."
 SAS_zavodizagran: "Factories Abroad"
 SAS_zavodizagran_desc: "Borders are a convention for capital and technology. While our factories are vulnerable to bombing or sanctions, a smart power plants industrial seeds on foreign soil. We will build factories where labor is cheap, where neutrality will protect from war, where raw materials are lying at our feet."
 SAS_sdelka: "Profitable Deals"
 SAS_sdelka_desc: "Our protectorate is not a charity organization, but an asset that must pay dividends. We protect them—they pay. We invest—they return with interest. We give technology—they give resources and the blood of their soldiers. It's time to translate our 'special relationship' into the language of contracts, where every service has a price, every concession has compensation, and every victory has its share of the spoils. War is an expensive business. Let the one who needs protection more pay."
