 ILY_kiracrisis3_desc:0 "Кудрово - место с которого начался постепенный процесс прекращения отношений между Ильёй и Кирой и осмыслением Ильёй того что Кира то и не любила его, а использовала лишь для выгоды и выпрашивания подарков.\n26 августа 2025 года Кира на фоне прошлых скандалов дестабилизирует Илью своими упоминаниями бывшего, унижением и истериками. В то же время Илья максимально хочет закончить всё это безумие но всё безуспешно."
